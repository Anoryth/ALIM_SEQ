name: Build Windows installer

# Builds the .exe (PyInstaller) + the installer (Inno Setup) on a real Windows
# runner, and publishes the artifacts. Triggered manually or on a tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Version: from the git tag when building a tag (v1.2.3 -> 1.2.3);
      # otherwise (manual run) from the TRACKED alim_seq/_version.py — never
      # clobbered with a 0.0.0-dev placeholder. The resolved value is rewritten
      # to alim_seq/_version.py (read by __init__.py -> app title/About) and
      # exported as VER for the Inno Setup step.
      - name: Determine version (git tag or _version.py)
        shell: cmd
        run: |
          set "REF=${{ github.ref_name }}"
          set "VER="
          if "%REF:~0,1%"=="v" set "VER=%REF:~1%"
          if not defined VER for /f "usebackq delims=" %%v in (`python -c "d={}; exec(open('alim_seq/_version.py').read(), d); print(d['__version__'])"`) do set "VER=%%v"
          echo Version: %VER%
          > alim_seq\_version.py echo __version__ = "%VER%"
          >> "%GITHUB_ENV%" echo VER=%VER%

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-qt.txt pyinstaller

      - name: Compile translation catalogs (.qm / .mo)
        run: python tools\compile_catalogs.py

      - name: Build EXE (PyInstaller)
        run: pyinstaller --noconfirm --clean packaging/ALIM_SEQ.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          echo Installer version: %VER%
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=%VER% packaging\ALIM_SEQ.iss

      - name: Zip the portable build
        shell: cmd
        run: tar -a -c -f dist\ALIM_SEQ-portable.zip -C dist ALIM_SEQ

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: ALIM_SEQ-portable
          path: dist/ALIM_SEQ-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ALIM_SEQ-Setup
          path: packaging/Output/ALIM_SEQ-Setup.exe
