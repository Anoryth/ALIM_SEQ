name: Build Windows installer

# Builds the .exe (PyInstaller) + the installer (Inno Setup) on a real Windows
# runner, and publishes the artifacts. Triggered manually or on a tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Version derived from the git tag (e.g. v1.2.3 -> 1.2.3). Written to
      # alim_seq/_version.py (read by __init__.py -> app title/About).
      - name: Determine version (git tag)
        shell: cmd
        run: |
          set "VER=${{ github.ref_name }}"
          if "%VER:~0,1%"=="v" (set "VER=%VER:~1%") else (set "VER=0.0.0-dev")
          echo Version: %VER%
          > alim_seq\_version.py echo __version__ = "%VER%"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-qt.txt pyinstaller

      - name: Compile translation catalogs (.qm / .mo)
        run: python tools\compile_catalogs.py

      - name: Build EXE (PyInstaller)
        run: pyinstaller --noconfirm --clean packaging/ALIM_SEQ.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          set "VER=${{ github.ref_name }}"
          if "%VER:~0,1%"=="v" (set "VER=%VER:~1%") else (set "VER=0.0.0-dev")
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=%VER% packaging\ALIM_SEQ.iss

      - name: Zip the portable build
        shell: cmd
        run: tar -a -c -f dist\ALIM_SEQ-portable.zip -C dist ALIM_SEQ

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: ALIM_SEQ-portable
          path: dist/ALIM_SEQ-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ALIM_SEQ-Setup
          path: packaging/Output/ALIM_SEQ-Setup.exe
